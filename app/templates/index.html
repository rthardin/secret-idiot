{% extends "base.html" %}
{% block content %}
<div class="screen centered">
  <div class="hero">
    <h1 class="logo">The Undercurrent</h1>
    <p class="tagline">A background social game for groups</p>
  </div>

  <div class="card">
    <h2>Host a Game</h2>
    <form method="POST" action="/create">
      <input type="text" name="host_name" placeholder="Your name" required maxlength="30" autocomplete="off">
      <button type="submit" class="btn btn-primary">Create Room</button>
    </form>
  </div>

  <div class="divider">or</div>

  <div class="card">
    <h2>Join a Game</h2>
    <form onsubmit="event.preventDefault(); var c = document.getElementById('join-code').value.trim().toUpperCase(); if(c) window.location='/join/'+c;">
      <input id="join-code" type="text" placeholder="Room code" maxlength="6" autocomplete="off" autocapitalize="characters" style="text-transform:uppercase; letter-spacing: 0.15em;">
      <button type="submit" class="btn btn-secondary">Join Room</button>
    </form>
  </div>
</div>
{% endblock %}
